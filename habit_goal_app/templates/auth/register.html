{% extends "base.html" %} {% Block title %} Sign Up | Habits and Goals
{%endblock %} {% block content %}
<h2>Create Account</h2>

<p>
  Create an account to securely track your habits, goals, progress and streaks.
</p>

<form method="post"
    <p>
        <label for="username">
                Username
            </label>
            <br>
            <input
                type="text"
                id="username"
                name="username"
                required
                minlength="3"
                maxlength="30">
    </p>

    <p>
            <label for="password">
                Password
            </label>
            <br>
            <input
                type="password"
                id="password"
                name="password"
                required
                minlength="8">
        </p>

        <button type="submit">
            Sign up
        </button>
    </form>

    <p>
        Already have an account?
        <a href="{{ url_for('auth.login') }}">
            Log in here
        </a>.
    </p>
{% endblock %}
